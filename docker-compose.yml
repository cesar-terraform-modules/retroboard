services:
  api:
    build:
      context: ./functions/api
      dockerfile: Dockerfile
    container_name: retroboard-api
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - PORT=8000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/docs').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retroboard-network
    volumes:
      - ./functions/api:/app
    command: python main.py

  email-summary:
    build:
      context: ./functions/email-summary
      dockerfile: Dockerfile
    container_name: retroboard-email-summary
    ports:
      - "8001:8000"
    environment:
      - SES_SENDER_EMAIL_ADDRESS=${SES_SENDER_EMAIL_ADDRESS:-noreply@example.com}
      - TEMPLATE_NAME=${TEMPLATE_NAME:-retroboard-summary}
      - PORT=8000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    networks:
      - retroboard-network
    volumes:
      - ./functions/email-summary:/app
    command: python main.py

  notification-service:
    build:
      context: ./functions/notification-service
      dockerfile: Dockerfile
    container_name: retroboard-notification-service
    ports:
      - "8002:8000"
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-http://localhost:3001/webhook}
      - PORT=8000
    networks:
      - retroboard-network
    volumes:
      - ./functions/notification-service:/app
    command: python main.py

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_HOST_URL: ${NEXT_PUBLIC_API_HOST_URL:-http://localhost:8000}
    container_name: retroboard-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - retroboard-network
    depends_on:
      api:
        condition: service_healthy

networks:
  retroboard-network:
    driver: bridge
